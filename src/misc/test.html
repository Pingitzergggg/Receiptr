<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .input-container {
            position: relative;

            input {
                border: none;
            }

            input:focus {
                outline: none;
            }

            label {
                position: absolute;
            }

            #border {
                position: absolute;
            }
        }

        .input-container:focus {
            outline: none;
        }
    </style>
</head>
<body>
    <div class="input-container">
        <label>Name</label>
        <input type="text">
        <div id="border"></div>
    </div>
</body>
